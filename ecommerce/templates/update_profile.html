{% extends 'base.html' %}
{% block content %}
<div style="max-width: 500px; margin: 60px auto; padding: 30px; background: white; border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.1);">
    <h2 style="margin-bottom: 20px; color: #1e293b; text-align: center;">Update Profile</h2>
    
    <form method="POST">
        {% csrf_token %}
        <div style="margin-bottom: 20px;">
            <label style="display: block; margin-bottom: 8px; color: #64748b; font-weight: 600;">Full Name</label>
            <input type="text" name="full_name" value="{{ user.first_name }}" required 
                   style="width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; outline: none; transition: 0.3s;"
                   onfocus="this.style.borderColor='#2563eb'">
        </div>

        <div style="margin-bottom: 25px;">
            <label style="display: block; margin-bottom: 8px; color: #64748b; font-weight: 600;">Email (Fixed)</label>
            <input type="email" value="{{ user.email }}" disabled 
                   style="width: 100%; padding: 12px; border: 1px solid #e2e8f0; background: #f8fafc; border-radius: 8px; cursor: not-allowed;">
        </div>

        <button type="submit" style="width: 100%; background: #2563eb; color: white; border: none; padding: 14px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s;"
                onmouseover="this.style.background='#1d4ed8'" onmouseout="this.style.background='#2563eb'">
            Save Changes
        </button>
    </form>
    
    <div style="text-align: center; margin-top: 20px;">
        <a href="{% url 'user_profile' %}" style="color: #64748b; text-decoration: none; font-size: 14px;">← Back to Profile</a>
    </div>
</div>
{% endblock %}
