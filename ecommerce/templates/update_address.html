{% extends 'base.html' %}
{% block content %}

<style>
    .form-card {
        max-width: 650px; margin: 50px auto; background: #fff;
        padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05);
    }
    .form-label { font-weight: 700; font-size: 0.8rem; color: #475569; text-transform: uppercase; }
    .form-control { border-radius: 10px; padding: 12px; border: 1px solid #e2e8f0; }
    .btn-update { background: #28a745; color: #fff; width: 100%; border-radius: 10px; padding: 12px; font-weight: 600; border: none; }
</style>

<div class="container">
    <div class="form-card">
        <h3 class="fw-bold mb-4 text-center">Update Address</h3>
        
        <form method="POST">
            {% csrf_token %}
            
            <div class="mb-3">
                <label class="form-label">Full Name</label>
                <input type="text" name="full_name" class="form-control" value="{{ address.full_name }}" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Street Address</label>
                <input type="text" name="street_address" class="form-control" value="{{ address.street_address }}" required>
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">City</label>
                    <input type="text" name="city" class="form-control" value="{{ address.city }}" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Pincode</label>
                    <input type="text" name="pincode" class="form-control" value="{{ address.pincode }}" required>
                </div>
            </div>

            <div class="mb-4">
                <label class="form-label">Phone Number</label>
                <input type="text" name="phone" class="form-control" value="{{ address.phone_number }}" required>
            </div>

            <button type="submit" class="btn-update shadow-sm">Update Address</button>
            <a href="{% url 'profile' %}" class="btn btn-light w-100 mt-2">Go Back</a>
        </form>
    </div>
</div>

{% endblock %}
