{% extends 'base.html' %}
{% block content %}

<style>
    .form-card {
        max-width: 600px; margin: 50px auto; background: #fff;
        padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05);
    }
    .profile-preview {
        width: 100px; height: 100px; border-radius: 50%; object-fit: cover;
        margin-bottom: 20px; border: 3px solid #007bff;
    }
    .form-label { font-weight: 700; font-size: 0.8rem; color: #475569; text-transform: uppercase; }
    .form-control { border-radius: 10px; padding: 12px; border: 1px solid #e2e8f0; }
    .btn-save { background: #007bff; color: #fff; width: 100%; border-radius: 10px; padding: 12px; font-weight: 600; border: none; }
</style>

<div class="container">
    <div class="form-card">
        <h3 class="fw-bold text-center mb-4">Edit Profile</h3>
        
        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            
            <div class="text-center">
                {% if user_profile.image %}
                    <img src="{{ user_profile.image.url }}" class="profile-preview">
                {% else %}
                    <div class="profile-preview d-inline-flex align-items-center justify-content-center bg-primary text-white fs-1">
                        {{ user.username|slice:":1"|upper }}
                    </div>
                {% endif %}
            </div>

            <div class="mb-3">
                <label class="form-label">Full Name</label>
                <input type="text" name="first_name" class="form-control" value="{{ user.first_name }}">
            </div>

            <div class="mb-3">
                <label class="form-label">Email Address</label>
                <input type="email" name="email" class="form-control" value="{{ user.email }}">
            </div>

            <div class="mb-4">
                <label class="form-label">Phone Number</label>
                <input type="text" name="phone" class="form-control" value="{{ user_profile.phone }}">
            </div>

            <button type="submit" class="btn-save">Save Changes</button>
            <a href="{% url 'profile' %}" class="btn btn-light w-100 mt-2 rounded-10">Cancel</a>
        </form>
    </div>
</div>

{% endblock %}
