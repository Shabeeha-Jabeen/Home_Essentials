{% extends 'admin/base_admin.html' %}
{% load static %}

{% block title %}Add New Product | Admin{% endblock %}

{% block content %}
<style>
    .form-container { padding: 20px; background-color: #f4f7f6; min-height: 100vh; }
    .form-card { 
        background: #ffffff; padding: 40px; border-radius: 12px; 
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05); max-width: 1000px; margin: auto; 
    }
    .form-title { 
        font-size: 24px; color: #1a1c23; margin-bottom: 25px; font-weight: 700; 
        display: flex; align-items: center; gap: 12px; border-bottom: 2px solid #edf2f7; padding-bottom: 15px; 
    }
    .form-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-bottom: 15px; }
    .form-group { display: flex; flex-direction: column; margin-bottom: 15px; }
    
    label { font-weight: 600; color: #4a5568; margin-bottom: 8px; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
    input, select, textarea { 
        padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px; outline: none; 
        transition: 0.3s; font-size: 14px; background: #fcfcfc; 
    }
    input:focus, select:focus, textarea:focus { border-color: #00a884; box-shadow: 0 0 0 3px rgba(0, 168, 132, 0.1); background: #ffffff; }

    /* Variant Table Styling */
    .variant-section { 
        background: #f8fafc; padding: 25px; border-radius: 12px; 
        border: 1px solid #e2e8f0; margin: 25px 0; 
    }
    .variant-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
    .variant-table th { font-size: 11px; color: #718096; text-align: left; padding: 10px; text-transform: uppercase; }
    .variant-table td { padding: 8px; }
    
    .btn-add-variant { 
        background: #3182ce; color: white; border: none; padding: 10px 20px; 
        border-radius: 6px; font-weight: 600; cursor: pointer; margin-top: 10px; font-size: 13px;
    }
    .btn-remove-variant { background: #feb2b2; color: #9b2c2c; border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer; }

    .optional-tag { font-size: 10px; color: #a0aec0; font-weight: normal; text-transform: none; margin-left: 5px; }
    .image-upload-section { background: #f8fafc; padding: 20px; border-radius: 10px; border: 1px dashed #cbd5e1; margin: 20px 0; }
    .preview-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 10px; }
    .preview-box { width: 100%; height: 120px; object-fit: cover; border-radius: 6px; border: 1px solid #e2e8f0; display: none; background: #eee; }

    .checkbox-container { display: flex; gap: 20px; padding: 15px; background: #f0fdf4; border-radius: 8px; margin-bottom: 20px; }
    .checkbox-item { display: flex; align-items: center; gap: 8px; font-weight: 600; color: #065f46; cursor: pointer; font-size: 14px; }

    .btn-save { background: #00a884; color: white; border: none; padding: 14px 45px; border-radius: 8px; font-weight: 700; cursor: pointer; transition: 0.3s; }
    .btn-save:hover { background: #008f6f; transform: translateY(-2px); }
    .btn-cancel { padding: 14px 20px; color: #718096; text-decoration: none; font-weight: 600; }
</style>

<div class="form-container">
    <div class="form-card">
        <h2 class="form-title">
            <a href="{% url 'product_list' %}" style="text-decoration: none; color: #00a884;">←</a>
            <span>Add New Product</span>
        </h2>

        <form method="POST" enctype="multipart/form-data" id="productForm">
            {% csrf_token %}

            <div class="form-row">
                <div class="form-group" style="grid-column: span 2;">
                    <label>Product Name <span style="color:red">*</span></label>
                    <input type="text" name="name" id="p_name" placeholder="E.g. Premium Kitchen Set" required>
                </div>
                <div class="form-group">
                    <label>Brand <span class="optional-tag">(Optional)</span></label>
                    <select name="brand">
                        <option value="">None</option>
                        {% for b in brands %}<option value="{{ b.id }}">{{ b.name }}</option>{% endfor %}
                    </select>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Main Category <span style="color:red">*</span></label>
                    <select name="category" required>
                        <option value="">Select Category</option>
                        {% for c in categories %}<option value="{{ c.id }}">{{ c.name }}</option>{% endfor %}
                    </select>
                </div>
                <div class="form-group">
    <label>Sub Category</label>
    <select name="subcategory" id="id_subcategory">
        <option value="">Select Subcategory</option>
        {% for s in subcategories %}
            <option value="{{ s.id }}">{{ s.name }}</option>
        {% endfor %}
    </select>
</div>

<div class="form-group">
    <label>Nested Category <span class="optional-tag">(Optional)</span></label>
    <select name="nested_category" id="id_nested_category">
        <option value="">None</option>
        {% for n in nested_categories %}
            <option value="{{ n.id }}" data-sub="{{ n.subcategory.id }}">{{ n.name }}</option>
        {% endfor %}
    </select>
</div>
            <div class="form-row">
                <div class="form-group">
                    <label>Material <span class="optional-tag">(Optional)</span></label>
                    <select name="material">
                        <option value="">Select Material</option>
                        {% for m in materials %}<option value="{{ m.id }}">{{ m.name }}</option>{% endfor %}
                    </select>
                </div>
                <div class="form-group">
                    <label>Base Price (₹) <span class="optional-tag">(Used if no variants)</span></label>
                    <input type="number" name="price" id="price" placeholder="0.00" step="0.01">
                </div>
                <div class="form-group">
                    <label>Base Stock</label>
                    <input type="number" name="stock" placeholder="0">
                </div>
            </div>

            <div class="variant-section">
                <label style="color: #2d3748; font-size: 14px;">Product Variants (Size, Price & Stock)</label>
                <p style="font-size: 11px; color: #718096; margin-bottom: 10px;">Add multiple sizes like 1 Litre, 2 Litre etc.</p>
                
                <table class="variant-table" id="variantTable">
                    <thead>
                        <tr>
                            <th>Size/Volume</th>
                            <th>Price (₹)</th>
                            <th>Stock</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td><input type="text" name="variant_size[]" placeholder="e.g. 1 Litre" class="form-control"></td>
                            <td><input type="number" name="variant_price[]" placeholder="500" class="form-control"></td>
                            <td><input type="number" name="variant_stock[]" placeholder="10" class="form-control"></td>
                            <td></td>
                        </tr>
                    </tbody>
                </table>
                <button type="button" class="btn-add-variant" onclick="addRow()">+ Add Another Size</button>
            </div>

            <div class="form-group">
                <label>Description</label>
                <textarea name="description" rows="3" placeholder="Product details..."></textarea>
            </div>

            <div class="image-upload-section">
                <label>Product Images <span class="optional-tag">(Main image is required)</span></label>
                <div class="form-row" style="margin-top:10px;">
                    <input type="file" name="image" onchange="preview(this, 'p1')" required accept="image/*">
                    <input type="file" name="image_2" onchange="preview(this, 'p2')" accept="image/*">
                    <input type="file" name="image_3" onchange="preview(this, 'p3')" accept="image/*">
                </div>
                <div class="preview-grid">
                    <img id="p1" class="preview-box">
                    <img id="p2" class="preview-box">
                    <img id="p3" class="preview-box">
                </div>
            </div>

            <div class="checkbox-container">
                <label class="checkbox-item"><input type="checkbox" name="is_offer"> Special Offer</label>
                <label class="checkbox-item"><input type="checkbox" name="is_featured"> Featured</label>
            </div>

            <div class="action-buttons">
                <button type="submit" class="btn-save" id="saveBtn">🚀 Save Product</button>
                <a href="{% url 'product_list' %}" class="btn-cancel">Cancel</a>
            </div>
        </form>
    </div>
</div>

<script>
    // Preview Image Logic
    function preview(input, id) {
        if (input.files && input.files[0]) {
            var reader = new FileReader();
            reader.onload = function(e) {
                var img = document.getElementById(id);
                img.src = e.target.result;
                img.style.display = 'block';
            }
            reader.readAsDataURL(input.files[0]);
        }
    }

    // Dynamic Row Logic for Variants
    function addRow() {
        var table = document.getElementById("variantTable").getElementsByTagName('tbody')[0];
        var row = table.insertRow(-1);
        row.innerHTML = `
            <td><input type="text" name="variant_size[]" placeholder="e.g. 2 Litre" required></td>
            <td><input type="number" name="variant_price[]" placeholder="800" required></td>
            <td><input type="number" name="variant_stock[]" placeholder="5" required></td>
            <td><button type="button" class="btn-remove-variant" onclick="removeRow(this)">✕</button></td>
        `;
    }

    function removeRow(btn) {
        var row = btn.parentNode.parentNode;
        row.parentNode.removeChild(row);
    }

    // Nested Category Filtering Logic
    document.getElementById('id_subcategory').addEventListener('change', function() {
        var subId = this.value;
        var nestedSelect = document.getElementById('id_nested_category');
        var options = nestedSelect.options;

        for (var i = 0; i < options.length; i++) {
            var opt = options[i];
            if (opt.value === "") {
                opt.hidden = false;
                continue;
            }
            // data-sub attribute check
            if (opt.getAttribute('data-sub') === subId) {
                opt.hidden = false;
            } else {
                opt.hidden = true;
            }
        }
        nestedSelect.value = ""; 
    });

    // Form Validation
    document.getElementById('productForm').onsubmit = function(e) {
        document.getElementById('saveBtn').innerText = "⏳ Saving...";
    };
</script>
{% endblock %}
