{% extends 'admin/base_admin.html' %}
{% block content %}
<div class="form-container" style="max-width: 600px; margin: 20px auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
    <h2 style="margin-bottom: 20px; color: #2d3748;">Edit Sub Category</h2>
    <form method="POST">
        {% csrf_token %}
        <div style="margin-bottom: 15px;">
            <label style="display: block; margin-bottom: 5px; font-weight: 600;">Main Category</label>
            <select name="category" required style="width: 100%; padding: 10px; border: 1px solid #e2e8f0; border-radius: 6px;">
                {% for cat in categories %}
                <option value="{{ cat.id }}" {% if cat.id == subcategory.category.id %}selected{% endif %}>{{ cat.name }}</option>
                {% endfor %}
            </select>
        </div>
        <div style="margin-bottom: 20px;">
            <label style="display: block; margin-bottom: 5px; font-weight: 600;">Sub Category Name</label>
            <input type="text" name="name" value="{{ subcategory.name }}" required 
                   style="width: 100%; padding: 10px; border: 1px solid #e2e8f0; border-radius: 6px;">
        </div>
        <button type="submit" style="width: 100%; background: #2d3748; color: white; border: none; padding: 12px; border-radius: 6px; cursor: pointer; font-weight: 600;">Update SubCategory</button>
    </form>
</div>
{% endblock %}
