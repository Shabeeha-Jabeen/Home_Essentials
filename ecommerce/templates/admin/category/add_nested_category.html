{% extends 'admin/base_admin.html' %}
{% block content %}
<div class="form-container" style="max-width: 600px; margin: 20px auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
    <h2 style="margin-bottom: 20px; color: #2d3748;">Add New Nested Category</h2>
    <form method="POST">
        {% csrf_token %}
        <div style="margin-bottom: 15px;">
            <label style="display: block; margin-bottom: 5px; font-weight: 600;">Select Sub Category</label>
            <select name="subcategory" required style="width: 100%; padding: 10px; border: 1px solid #e2e8f0; border-radius: 6px;">
                <option value="" disabled selected>Choose a subcategory</option>
                {% for sub in subcategories %}
                <option value="{{ sub.id }}">{{ sub.name }} ({{ sub.category.name }})</option>
                {% endfor %}
            </select>
        </div>
        <div style="margin-bottom: 20px;">
            <label style="display: block; margin-bottom: 5px; font-weight: 600;">Nested Category Name</label>
            <input type="text" name="name" placeholder="Enter nested category name" required 
                   style="width: 100%; padding: 10px; border: 1px solid #e2e8f0; border-radius: 6px;">
        </div>
        <button type="submit" style="flex: 1; background: #008080; color: white; border: none; padding: 12px; border-radius: 6px; cursor: pointer; font-weight: 600;">Save NestedCategory</button>
            <a href="{% url 'category_list' %}" style="flex: 1; text-align: center; background: #edf2f7; color: #4a5568; padding: 12px; border-radius: 6px; text-decoration: none; font-weight: 600;">Cancel</a>
    </form>
</div>
{% endblock %}
